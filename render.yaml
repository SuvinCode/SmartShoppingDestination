# render.yaml — Render Blueprint
# Live URLs:
#   Website (frontend): https://docket-web-2cxk.onrender.com
#   Backend API:        https://docket-api-????.onrender.com  ← check Render dashboard
#   Python AI:         https://smartshoppingdestination.onrender.com

services:
  # ──────────────────────────────────────────────────────────
  # 1. Python AI Service (FastAPI + Tesseract OCR)
  #    URL: https://smartshoppingdestination.onrender.com  (already deployed)
  # ──────────────────────────────────────────────────────────
  - type: web
    name: docket-ai
    runtime: docker
    dockerfilePath: ./ai-service/Dockerfile
    dockerContext: ./ai-service
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 8000

  # ──────────────────────────────────────────────────────────
  # 2. C# .NET Backend API
  #    Service name: docket-api
  #    URL: https://docket-api-????.onrender.com
  # ──────────────────────────────────────────────────────────
  - type: web
    name: docket-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/catalog/search?q=milk
    envVars:
      - key: PYTHON_SERVICE_URL
        value: https://smartshoppingdestination.onrender.com
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:5100

  # ──────────────────────────────────────────────────────────
  # 3. React Frontend (Vite static site)
  #    Service name: docket-web
  #    Live URL: https://docket-web-2cxk.onrender.com  ← the website
  # ──────────────────────────────────────────────────────────
  - type: web
    name: docket-web
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # UPDATE THIS to your actual docket-api URL from Render dashboard
      - key: VITE_API_URL
        value: https://docket-api-????.onrender.com
