# render.yaml — Render Blueprint
# Matches existing Render services: docket-web (frontend) + docket-api (C# backend)
# Plus docket-ai for the Python OCR service.

services:
  # ──────────────────────────────────────────────────────────
  # 1. Python AI Service (FastAPI + Tesseract OCR)
  #    URL: https://docket-ai.onrender.com
  #    If you already have this running as 'smartshoppingdestination',
  #    you can skip this block and just set PYTHON_SERVICE_URL manually.
  # ──────────────────────────────────────────────────────────
  - type: web
    name: docket-ai
    runtime: docker
    dockerfilePath: ./ai-service/Dockerfile
    dockerContext: ./ai-service
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 8000

  # ──────────────────────────────────────────────────────────
  # 2. C# .NET Backend API
  #    Existing service: docket-api
  #    URL: https://docket-api.onrender.com
  # ──────────────────────────────────────────────────────────
  - type: web
    name: docket-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/catalog/search?q=milk
    envVars:
      # Set this to your Python AI service URL in the Render dashboard.
      # If using the old smartshoppingdestination service:
      #   PYTHON_SERVICE_URL = https://smartshoppingdestination.onrender.com
      # If deploying the new docket-ai service above:
      #   PYTHON_SERVICE_URL = https://docket-ai.onrender.com
      - key: PYTHON_SERVICE_URL
        value: https://smartshoppingdestination.onrender.com
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:5100

  # ──────────────────────────────────────────────────────────
  # 3. React Frontend (Vite static site)
  #    Existing service: docket-web
  #    URL: https://docket-web.onrender.com  ← this is your website
  # ──────────────────────────────────────────────────────────
  - type: web
    name: docket-web
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Points the frontend at the C# backend
      - key: VITE_API_URL
        value: https://docket-api.onrender.com
